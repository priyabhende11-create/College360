<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Expert Lecture | College360</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif
    }

    body {
      margin: 0;
      background: #f4f6f8
    }

    /* HEADER */
    header {
      background: #1f3c88;
      color: #fff;
      padding: 14px 20px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
    }

    .back-btn,
    .view-btn {
      background: #fff;
      color: #1f3c88;
      padding: 6px 12px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    .header-center {
      text-align: center
    }

    .inst-name {
      font-size: 18px;
      font-weight: bold
    }

    .sub-title {
      font-size: 14px;
      opacity: 0.9
    }

    /* CARD */
    .card {
      width: 70%;
      margin: 30px auto;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px
    }

    /* SUCCESS MSG */
    .success-msg {
      background: #e6fffa;
      color: #065f46;
      border: 1px solid #34d399;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 100%;
    }

    .full {
      grid-column: 1/3
    }

    button {
      margin-top: 20px;
      background: #1f3c88;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <a href="/act" class="back-btn">⬅ Back</a>

    <div class="header-center">
      <div class="inst-name">Government Polytechnic Yavatmal</div>

    </div>

    <a href="{{ url_for('hod_k9_view') }}" class="view-btn">👁 View Report</a>
  </header>

  <div class="card">
    <h2>Expert Lecture Details</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="success-msg">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <form method="POST" enctype="multipart/form-data">
      <div class="form-grid">

        <input name="academic_year" placeholder="Academic Year" required>
        <input value="{{ dept_name }}" readonly>

        <!-- <input name="sr_no" placeholder="Sr No"> -->
        <input name="expert_name" placeholder="Expert Name">
        <input name="email" placeholder="email" required>


        <input name="designation" placeholder="Designation">
        <input name="organization" placeholder="Organization">

        <input type="date" name="lecture_date">
        <input name="topic" placeholder="Topic">

        <input name="year_sem" placeholder="Year / Semester">
        <input name="coordinator" placeholder="Coordinator Name">

        <input name="students" placeholder="Students Attended">
        <input name="po_pso" placeholder="PO / PSO">

        <input type="file" name="photo" multiple accept="image/*" class="full">
      </div>

      <center>
        <button type="submit">Save</button>
      </center>
    </form>
  </div>

</body>

</html>
