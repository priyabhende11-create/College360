<!DOCTYPE html>
<html>
<head>
  <title>Edit Testing</title>
  <style>
    body{font-family:Arial;background:#f4f6f8;margin:0}
    header{background:#1f3c88;color:#fff;padding:10px;text-align:center}
    .container{max-width:800px;margin:30px auto;background:#fff;
      padding:25px;border-radius:12px}
    label{font-weight:bold}
    input,textarea{width:100%;padding:10px;margin:8px 0}
    button{background:#4caf50;color:white;padding:10px;border:none;
      border-radius:6px}
  </style>
</head>

<body>

<header>
  <h1>Government Polytechnic Yavatmal</h1>
</header>

<div class="container">
  <h2>Edit Lab Testing</h2>

  <form method="POST">
    <label>Tester Name</label>
    <input name="tester_name" value="{{ record.tester_name }}" required>

    <label>Contact</label>
    <input name="tester_contact" value="{{ record.tester_contact }}" required>

    <label>Date</label>
    <input type="date" name="test_date" value="{{ record.test_date }}" required>

    <label>Expense</label>
    <input name="expense" value="{{ record.expense }}" required>

    <label>Remarks</label>
    <textarea name="remarks">{{ record.remarks }}</textarea>

    <br><br>
    <button type="submit">Update</button>
  </form>
</div>

</body>
</html>
