<!DOCTYPE html>
<html>

<head>
    <title>Department Tasks</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #f4f6fb;
            padding: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #274bdb;
            color: white;
        }

        button {
            background: #16a34a;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .header-back {
            background-color: rgb(231, 97, 97);
            color: rgb(224, 216, 216);
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .header-back:hover {
            background-color: darkred;
        }
    </style>

</head>


<body>
    <a href="{{ url_for('staff_dash') }}" class="header-back" background-color:"red">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <h2>Department Tasks</h2>

    <table border="1">

        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for t in tasks %}

        <tr>

            <td>{{ t.title }}</td>

            <td>{{ t.description }}</td>

            <td>{{ t.status }}</td>

            <td>

                {% if t.status != "Completed" %}

                <form action="{{ url_for('mark_complete', task_id=t.id) }}" method="POST">
                    <button type="submit">Complete</button>
                </form>

                {% else %}

                Completed

                {% endif %}

            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
