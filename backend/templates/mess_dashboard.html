<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLG360 | Girls Hostel Mess Dashboard</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Arial, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
.header{
    height:60px;
    background:#1f3c88;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:600;
    position:relative;
}

.back-btn{
    position:absolute;
    left:20px;
    background:none;
    border:none;
    color:white;
    font-size:14px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    padding:30px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 6px 14px rgba(0,0,0,0.08);
    text-align:center;
}

.card h3{
    margin:0;
    font-size:16px;
    color:#555;
}

.card p{
    margin-top:10px;
    font-size:26px;
    font-weight:600;
    color:#1f3c88;
}

/* ACTION BUTTONS */
.actions{
    margin-top:30px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.actions a{
    text-decoration:none;
    background:#1f3c88;
    color:white;
    padding:12px 22px;
    border-radius:6px;
    font-size:14px;
    font-weight:600;
}

.actions a:hover{
    background:#163172;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <button class="back-btn" onclick="window.location.href='/'">⬅ Back</button>
    Girls Hostel Mess Dashboard
</div>

<!-- CONTENT -->
<div class="container">

    <!-- STATS -->
    <div class="cards">

        <div class="card">
            <h3>Total Girls</h3>
            <p>{{ total_girls }}</p>
        </div>

        <div class="card">
            <h3>Total Paid Amount</h3>
            <p>₹ {{ total_paid }}</p>
        </div>

        <div class="card">
            <h3>Pending Amount</h3>
            <p>₹ {{ total_pending }}</p>
        </div>

    </div>

    <!-- ACTIONS -->
    <div class="actions">
        <a href="/add">➕ Add Girl</a>
        <a href="/mess_view">📄 View Records</a>
    </div>

</div>

</body>
</html>
