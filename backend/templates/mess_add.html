<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLG360 | Add Mess Girl</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Arial, sans-serif;
    background:#f4f6f9;
}
.header{
    height:60px;
    background:#1f3c88;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:600;
    position:relative;
}
.back-btn{
    position:absolute;
    right:700px;
    background:none;
    border:none;
    color:white;
    font-size:17px;
    cursor:pointer;
}
.container{
    display:flex;
    justify-content:center;
    padding:40px;
}
.card{
    width:500px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
label{
    font-weight:600;
    margin-top:15px;
    display:block;
}
input, select{
    width:100%;
    height:40px;
    padding:0 10px;
    margin-top:5px;
}
button{
    margin-top:25px;
    width:100%;
    height:42px;
    background:#1f3c88;
    color:white;
    border:none;
    border-radius:5px;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='/mess_dashboard'">⬅ Back</button>
  Add Girls Hostel Mess
</div>

<div class="container">
<div class="card">

<form method="post">

<label>Student Name</label>
<input type="text" name="student_name" required>

<label>Department</label>
<select name="dept_id" required>
  <option value="">Select</option>
  {% for d in departments %}
  <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
  {% endfor %}
</select>

<label>Diploma Year</label>
<select name="diploma_year">
  <option>1</option>
  <option>2</option>
  <option>3</option>
</select>

<label>Month</label>
<select name="month">
  <option>January</option><option>February</option><option>March</option>
  <option>April</option><option>May</option><option>June</option>
  <option>July</option><option>August</option><option>September</option>
  <option>October</option><option>November</option><option>December</option>
</select>

<label>Year</label>
<input type="number" name="year" value="2025">

<label>Mess Fee</label>
<input type="number" name="mess_fee">

<label>Status</label>
<select name="status">
  <option>Paid</option>
  <option>Pending</option>
</select>

<button type="submit">Save</button>

</form>
</div>
</div>

</body>
</html>
