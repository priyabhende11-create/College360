<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Principal Login – Government Polytechnic Yavatmal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
    }

    .home {
        position: absolute;
        top: 40px;
        left: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 900;
        color: #ffffff;
      }

    .header {
      background: #0a2a66;
      color: white;
      padding: 18px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    /* Green Back Box */
    .back-home {
      position: absolute;
      left: 30px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      background-color: #e0e6e0;
      color: rgb(62, 72, 179);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
    }

    .back-home:hover {
      background-color: #45a049;
    }

    .login-page {
      height: calc(100vh - 72px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      width: 350px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .login-box h2 {
      color: #0a2a66;
      margin-bottom: 15px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="header">
    <a class="back-home" href="{{ url_for('index') }}">
      <i class="fa-solid fa-arrow-none"></i> Back to Homepage
    </a>
    <h1>Government Polytechnic Yavatmal</h1>
  </div>

  <div class="login-page">
    <div class="login-box">
      <h2>Principal Login</h2>
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      {% for message in messages %}
      <div style="color:green; margin-bottom:10px;">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}
      {% endwith %}
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <!-- 🔴 IMPORTANT: Flask FORM -->
      <form method="POST" action="{{ url_for('principal_login') }}">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>


      <div style="margin-top:10px;">
        <a href="{{ url_for('forgot_password') }}" style="font-size:14px; color:#2563eb; text-decoration:none;">
          Forgot Password?
        </a>
      </div>
    </div>
  </div>

</body>

</html>
