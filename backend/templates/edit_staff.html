<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Staff - Government Polytechnic Yavatmal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* Header styling */
        header {
            background-color: #1f3c88;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* College name centered */
        .college-name {
            font-size: 1.8rem;
            font-weight: 600;
        }

        /* Back arrow box */
        .back-box {
            position: absolute;
            left: 20px;
            background-color: #28a745;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .back-box i {
            margin-right: 5px;
            font-size: 1.2rem;
        }

        /* Page title styling */
        .page-title {
            color: #1f3c88;
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            text-align: center;
        }
    </style>
</head>

<body class="bg-light">

    <!-- Header with back arrow -->
    <header>
        <a class="back-box" href="{{ url_for('view_hod_staff') }}">
            <i class="bi bi-arrow-left-circle-fill"></i> Back
        </a>
        <div class="college-name">Government Polytechnic Yavatmal</div>
    </header>

    <div class="container mt-4">

        <!-- Page title -->
        <h3 class="page-title">Edit Staff</h3>

        <form method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" value="{{ staff.staff_name }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" value="{{ staff.email }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Contact</label>
                <input type="text" name="contact" value="{{ staff.contact }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Qualification</label>
                <input type="text" name="qualification" value="{{ staff.qualification }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Address</label>
                <textarea name="address" class="form-control">{{ staff.address }}</textarea>
            </div>

            <div class="mb-3">
                <label>Role</label>
                <select name="role" class="form-select">
                    <option value="staff" {% if staff.role=='staff' %}selected{% endif %}>Staff</option>
                    <option value="hod" {% if staff.role=='hod' %}selected{% endif %}>HOD</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Profile Photo</label>
                <input type="file" name="photo" class="form-control">
            </div>

            <div class="text-center">
                <button class="btn btn-success">Update</button>
                <a href="{{ url_for('view_hod_staff') }}" class="btn btn-secondary">Cancel</a>
            </div>

        </form>

    </div>

</body>
</html>
