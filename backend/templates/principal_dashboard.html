<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Principal Dashboard – Government Polytechnic Yavatmal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f2f4f8;
            margin: 0;
        }

        /* Header */
        .header {
            background: #0e254b;
            color: rgb(229, 221, 221);
            padding: 18px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }

        /* Green back arrow box */
        .header-back {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: white;
            color: rgb(208, 128, 128);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        .header-back i {
            font-size: 16px;
        }

        .header-back:hover {
            background-color: #1f8a2b;
        }

        /* DASHBOARD LAYOUT */
        .dashboard-container {
            display: flex;
            height: calc(100vh - 72px);
        }

        /* LEFT MENU */
        .sidebar {
            width: 280px;
            background: #eef2f7;
            padding: 25px;
            border-right: 1px solid #ddd;
        }

        .sidebar h3 {
            margin-bottom: 25px;
            text-align: center;
            color: #0a2a66;
        }

        .menu-item {
            background: #ffffff;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #0a2a66;
            border-left: 4px solid #2563eb;
            transition: 0.3s;
        }

        .menu-item:hover {
            background: #e8efff;
        }

        .menu-item i {
            width: 22px;
            font-size: 16px;
        }

        .logout {
            margin-top: 25px;
            background: #ffecec;
            border-left-color: #e11d48;
            color: #b91c1c;
        }

        /* RIGHT CONTENT */
        .content {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-box {
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 600px;
        }

        .welcome-box h2 {
            color: #0a2a66;
            margin-bottom: 10px;
        }

        .welcome-box p {
            color: #555;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div class="header">

        <!-- Green back arrow -->
        <a href="{{ url_for('index') }}" class="header-back">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>

        <h1>Government Polytechnic Yavatmal</h1>

    </div>

    <div class="dashboard-container">

        <div class="sidebar">
            <h3>Department & Staff Control</h3>

            <a href="{{ url_for('add_dept') }}" class="menu-item">
                <i class="fa-solid fa-building-columns"></i> Add Department
            </a>

            <a href="{{ url_for('employee_add') }}" class="menu-item">
                <i class="fa-solid fa-users-gear"></i> Add Staff
            </a>

            <a href="{{ url_for('assign_hod_page') }}" class="menu-item">
                <i class="fa-solid fa-user-shield"></i> Assign HOD
            </a>

            <a href="{{ url_for('principal_mou') }}" class="menu-item">
                <i class="fa-solid fa-file-signature"></i> View MOU
            </a>


            <a href="{{ url_for('testing_redirect') }}" class="menu-item">
                <i class="fa-solid fa-flask"></i> Testing
            </a>
        



            <a href="{{ url_for('act') }}" class="menu-item">
                <i class="fa-solid fa-chart-column"></i> View Activity
            </a>

            <div class="menu-item">
                <i class="fa-solid fa-people-roof"></i> Assign Mess & Hostel Rector
            </div>

            <a href="{{ url_for('principal_login') }}" class="menu-item logout">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>

        <div class="content">
            <div class="welcome-box">
                <h2>Welcome, Principal</h2>
                <p>Centralized academic administration and institutional monitoring dashboard.</p>
            </div>
        </div>

    </div>

</body>

</html>
