<!DOCTYPE html>
<html>

<head>
    <title>Upload Gazette</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

    <div class="container mt-4">

        <!-- 🔙 Back + View Buttons -->
        <div class="d-flex justify-content-between mb-3">
            <a href="/act" class="btn btn-secondary">
                ← Back
            </a>

            <a href="/gazette_view" class="btn btn-primary">
                View Gazette
            </a>
        </div>

        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center">
                <h4>Bulk Gazette Upload</h4>
            </div>

            <div class="card-body">

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form action="/upload_gazette" method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label>Academic Year</label>
                        <input type="text" name="academic_year" class="form-control" required>
                    </div>

                    <!-- 🔥 Scheme Dropdown -->
                    <div class="mb-3">
                        <label>Select Scheme</label>
                        <select name="scheme_id" class="form-control" required>
                            <option value="">Select Scheme</option>
                            {% for s in schemes %}
                            <option value="{{ s.id }}">{{ s.scheme_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- 🔥 Semester Checkbox -->
                    <div class="mb-3">
                        <label>Select Semester Sheet To Upload</label><br>
                        {% for i in range(1,7) %}
                        <input type="checkbox" name="semesters" value="{{ i }}"> Sem {{ i }}
                        {% endfor %}
                    </div>

                    <div class="mb-3">
                        <input type="file" name="file" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Upload</button>

                </form>

                <hr>

                <div class="mb-3">
                    <button type="button" id="downloadBtn" class="btn btn-success mb-3">
                        Download Gazette Format
                    </button>
                </div>

            </div>
        </div>

    </div>

</body>
<script>
    document.getElementById("downloadBtn").addEventListener("click", function () {
        const schemeSelect = document.querySelector('select[name="scheme_id"]');
        const schemeId = schemeSelect.value;

        if (!schemeId) {
            alert("Please select a scheme first!");
            return;
        }

        // Redirect to the correct download URL
        window.location.href = `/download_template/${schemeId}`;
    });
</script>

</html>
