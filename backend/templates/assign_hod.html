<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Assign HOD – Government Polytechnic Yavatmal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif
        }

        body {
            background: #f4f6f9
        }

        .header {
            background: #0a2a66;
            color: white;
            padding: 16px;
            text-align: center;
            position: relative
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 16px;
            background: #a4bd89;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08)
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0a2a66
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px
        }

        label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px
        }

        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc
        }

        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600
        }

        .btn-green {
            background: #ca6324;
            color: white
        }

        /* MESSAGE BOX */
        .msg-box {
            display: none;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500
        }

        .success {
            background: #d1fae5;
            color: #065f46
        }

        .error {
            background: #fee2e2;
            color: #991b1b
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="{{ url_for('principal_dashboard') }}" class="back-btn">⬅ Back</a>
        <h1>Government Polytechnic Yavatmal</h1>
    </div>

    <div class="container">

        <h2>Assign Principal HOD</h2>

        <!-- 🔔 MESSAGE BOX -->
        <div id="msgBox" class="msg-box"></div>

        <div class="form-grid">

            <div>
                <label>Select Department</label>
                <select id="deptSelect" onchange="loadStaff()">
                    <option value="">-- Select Department --</option>
                    {% for d in departments %}
                    <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Select Staff</label>
                <select id="staffSelect">
                    <option value="">-- Select Staff --</option>
                </select>
            </div>

            <div>
                <label>Assign</label><br>
                <button class="btn btn-green" onclick="assignHOD()">Assign HOD</button>
            </div>
            <br>
            <div style="text-align:center;">
                <a href="{{ url_for('view_hod_staff') }}" class="btn btn-blue"
                    style="text-decoration:none; display:inline-block;">
                    👁 View HOD & Staff List
                </a>
            </div>

        </div>

    </div>

    </div>

    <script>
        function loadStaff() {
            const deptId = document.getElementById("deptSelect").value;
            const staffSelect = document.getElementById("staffSelect");

            staffSelect.innerHTML = "<option value=''>-- Select Staff --</option>";

            if (!deptId) return;

            fetch(`/get_staff_by_department/${deptId}`)
                .then(res => res.json())
                .then(data => {
                    data.forEach(s => {
                        staffSelect.innerHTML += `
                            <option value="${s.staff_id}">
                                ${s.staff_name}
                            </option>`;
                    });
                });
        }

        function assignHOD() {
            const staffId = document.getElementById("staffSelect").value;
            const msgBox = document.getElementById("msgBox");

            if (!staffId) {
                msgBox.className = "msg-box error";
                msgBox.innerHTML = "❌ Please select staff";
                msgBox.style.display = "block";
                return;
            }

            fetch("/assign_hod_action", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ staff_id: staffId })
            })
                .then(res => res.json())
                .then(data => {
                    msgBox.style.display = "block";

                    if (data.success) {
                        msgBox.className = "msg-box success";
                        msgBox.innerHTML = "✅ HOD assigned successfully";

                        // OPTIONAL auto redirect
                        setTimeout(() => {
                            window.location.href = "/view_hod_staff";
                        }, 1500);
                    } else {
                        msgBox.className = "msg-box error";
                        msgBox.innerHTML = data.message || "❌ Assignment failed";
                    }
                });
        }
    </script>

</body>

</html>
