<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>CLG360 – Assign Task</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Segoe UI;
            background: #f4f6fb;
            margin: 0;
        }

        /* HEADER */

        .header {
            height: 90px;
            background: linear-gradient(90deg, #1f3c88, #274bdb);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            position: relative;
        }

        .header-back {
            position: absolute;
            left: 20px;
            background: white;
            color: #1f3c88;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
        }

        /* FORM */

        .container {
            width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 15px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #274bdb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="header">

        <a href="{{ url_for('hod_dashboard') }}" class="header-back">
            <i class="fas fa-arrow-left"></i> Back
        </a>

        CLG360 – Assign Task

    </div>

    <div class="container">

        <form method="POST">

            <label>Staff</label>

            <select name="staff_id" required>

                {% for staff in staff_list %}
                <option value="{{ staff.staff_id }}">
                    {{ staff.staff_name }}
                </option>
                {% endfor %}

            </select>


            <label>Department</label>

            <select name="dept_id" required>

                {% for d in departments %}

                <option value="{{ d.dept_id }}">
                    {{ d.dept_name }}
                </option>

                {% endfor %}

            </select>
          


            <label>Task Title</label>
            <input type="text" name="title" required>


            <label>Description</label>
            <textarea name="description" rows="4" required></textarea>


            <button type="submit">
                Assign Task
            </button>

        </form>

    </div>

</body>

</html>
