<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>CLG360 | View CT Attainment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f5f6fa;
    }

    .header {
      height: 60px;
      background-color: #1f3c88;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 20px;
      background: #28a745;
      border: none;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.3s ease;
    }

    .back-btn:hover {
      background: #218838;
    }


    .page-container {
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 900px;
      background-color: #ffffff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .info-row {
      display: flex;
      gap: 30px;
      margin-bottom: 20px;
      font-weight: 600;
      color: #1f3c88;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #cfcfcf;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background-color: #eef1f8;
    }
  </style>
</head>

<body>

  <div class="header">
    <button class="back-btn" onclick="window.history.back()">← Back</button>
    View CT Attainment
  </div>

  <div class="card">
    <form method="get" class="mb-3" style="display:flex; gap:15px; align-items:center;">

      <select name="academic_year" class="form-select" style="width:220px;" required>
        <option value="">Select Academic Year</option>
        {% for y in years %}
        <option value="{{ y.academic_year }}" {% if selected_year==y.academic_year %}selected{% endif %}>
          {{ y.academic_year }}
        </option>
        {% endfor %}
      </select>

      <button class="btn btn-primary btn-sm">
        🔍 View
      </button>

    </form>


    <table>
      <thead>
        <tr>
          <th>Academic Year</th>
          <!-- <th>Dept ID</th> -->
          <th>Course Code</th>
          <th>Question</th>
          <!-- <th>Total (K7)</th> -->
          <th>CO No</th>
        </tr>
      </thead>

      <tbody>
        {% for r in records %}
        <tr>
          <td>{{ r.academic_year }}</td>
          <!-- <td>{{ r.dept_id }}</td> -->
          <td>{{ r.course_code }}</td>
          <td>{{ r.question }}</td>
          <!-- <td>{{ r.total }}</td> -->
          <td>{{ r.co_no }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

  </div>

</body>

</html>
