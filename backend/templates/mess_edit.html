<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLG360 | Edit Mess Record</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f4f6f9;
}

/* ===== HEADER ===== */
.header{
    height:60px;
    background:#1f3c88;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    font-size:18px;
    font-weight:600;
}

.back-btn{
    position:absolute;
    left:20px;
    background:none;
    border:none;
    color:white;
    font-size:14px;
    cursor:pointer;
}

/* ===== PAGE ===== */
.page-container{
    display:flex;
    justify-content:center;
    margin-top:40px;
}

.card{
    background:white;
    width:520px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card-title{
    text-align:center;
    color:#1f3c88;
    font-size:18px;
    font-weight:600;
    margin-bottom:20px;
}

/* ===== FORM ===== */
.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:500;
}

input, select{
    width:100%;
    height:42px;
    padding:0 12px;
    border:1px solid #b5b5b5;
    border-radius:4px;
    font-size:14px;
}

input:focus, select:focus{
    outline:none;
    border-color:#1f3c88;
}

/* ===== BUTTON ===== */
.btn-primary{
    width:100%;
    height:42px;
    background:#1f3c88;
    border:none;
    border-radius:4px;
    color:white;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

.btn-primary:hover{
    background:#163172;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <button class="back-btn" onclick="window.location.href='/mess_view'">⬅ Back</button>
    Edit Mess Record
</div>

<!-- CONTENT -->
<div class="page-container">
<div class="card">

<div class="card-title">Girls Hostel Mess – Edit Details</div>

<form method="post">

<div class="form-group">
<label>Student Name</label>
<input type="text" name="student_name"
       value="{{ record.student_name }}" required>
</div>

<div class="form-group">
<label>Department</label>
<select name="dept_id" required>
    {% for d in departments %}
    <option value="{{ d.dept_id }}"
      {% if d.dept_id == record.dept_id %}selected{% endif %}>
      {{ d.dept_name }}
    </option>
    {% endfor %}
</select>
</div>

<div class="form-group">
<label>Diploma Year</label>
<select name="diploma_year" required>
    <option {% if record.diploma_year=="First Year" %}selected{% endif %}>First Year</option>
    <option {% if record.diploma_year=="Second Year" %}selected{% endif %}>Second Year</option>
    <option {% if record.diploma_year=="Third Year" %}selected{% endif %}>Third Year</option>
</select>
</div>

<div class="form-group">
<label>Month</label>
<input type="text" name="month"
       value="{{ record.month }}" required>
</div>

<div class="form-group">
<label>Year</label>
<input type="text" name="year"
       value="{{ record.year }}" required>
</div>

<div class="form-group">
<label>Mess Fee</label>
<input type="number" name="mess_fee"
       value="{{ record.mess_fee }}" required>
</div>

<div class="form-group">
<label>Status</label>
<select name="status">
    <option {% if record.status=="Paid" %}selected{% endif %}>Paid</option>
    <option {% if record.status=="Unpaid" %}selected{% endif %}>Unpaid</option>
</select>
</div>

<button type="submit" class="btn-primary">Update Record</button>

</form>

</div>
</div>

</body>
</html>
