<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #fff;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Reset Password</h2>

        {% if message %}
        <div class="success">{{ flash("Username and Password Updated Successfully!") }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="new_username" placeholder="Enter New Username" required>
            <input type="password" name="new_password" placeholder="Enter New Password" required>
            <button type="submit">Reset Credentials</button>
        </form>
        <br>
        <a href="{{ url_for('principal_login') }}">Back to Login</a>
    </div>

</body>

</html>
