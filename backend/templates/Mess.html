<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CLG360 | Girls Hostel Mess</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f5f6fa;
    }

    /* Header */
    .header {
      height: 60px;
      background-color: #1f3c88;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    /* Page */
    .page-container {
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 900px;
      background-color: #ffffff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card-title {
      color: #1f3c88;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Summary boxes */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .box {
      background-color: #eef1f8;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .box h3 {
      margin: 0;
      font-size: 22px;
      color: #1f3c88;
    }

    .box p {
      margin: 5px 0 0;
      font-size: 14px;
      font-weight: 600;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #cfcfcf;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background-color: #eef1f8;
      font-weight: 600;
    }

    .paid {
      color: green;
      font-weight: 600;
    }

    .pending {
      color: red;
      font-weight: 600;
    }

    /* Button */
    .btn {
      margin-top: 20px;
      background-color: #1f3c88;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #163172;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
    Girls Hostel – Mess Dashboard
  </div>

  <!-- CONTENT -->
  <div class="page-container">
    <div class="card">

      <div class="card-title">Monthly Mess Summary (Girls Hostel)</div>

      <!-- SUMMARY -->
      <div class="summary">
        <div class="box">
          <h3>48</h3>
          <p>Total Girls</p>
        </div>
        <div class="box">
          <h3>₹2500</h3>
          <p>Mess Fee / Month</p>
        </div>
        <div class="box">
          <h3>40</h3>
          <p>Paid Students</p>
        </div>
        <div class="box">
          <h3>8</h3>
          <p>Pending</p>
        </div>
      </div>

      <!-- TABLE -->
      <table>
        <thead>
          <tr>
            <th>Student Name</th>
            <th>Room No</th>
            <th>Month</th>
            <th>Year</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Anjali Patil</td>
            <td>G-101</td>
            <td>January</td>
            <td>2026</td>
            <td>2500</td>
            <td class="paid">Paid</td>
          </tr>
          <tr>
            <td>Priya Deshmukh</td>
            <td>G-102</td>
            <td>January</td>
            <td>2026</td>
            <td>2500</td>
            <td class="pending">Pending</td>
          </tr>
        </tbody>
      </table>

      <button class="btn" onclick="window.location.href='add_mess_payment.html'">
        Add / Update Payment
      </button>

    </div>
  </div>

</body>
</html>
