<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HOD Login - Government Polytechnic Yavatmal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .top-header {
      background: #0b3c5d;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 80px);
    }

    .login-box {
      width: 380px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      padding: 30px;
      animation: fadeSlide 0.8s ease-out;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #0b3c5d;
    }

    .home {
        position: absolute;
        top: 40px;
        left: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 900;
        color: #ffffff;
      }

      label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 18px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      input:focus {
        outline: none;
        border: 1px solid #0b3c5d;
        box-shadow: 0 0 6px rgba(11, 60, 93, 0.3);
      }

      button {
        width: 100%;
        padding: 12px;
        background: #0b3c5d;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        background: #092f47;
      }
  </style>
</head>

<body>

  <div class="top-header">
    Government Polytechnic Yavatmal
  </div>
  <div>
    <a href="{{ url_for('index') }}" class="home">Home</a>
  </div>

  <div class="login-container">
    <div class="login-box">
      <h2>HOD Login</h2>

      <!-- 🔥 FIXED FORM -->
      <form method="POST" action="{{ url_for('hod_login') }}">

        <label>Username</label>
        <input type="username" name="username" placeholder="Enter registered username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
      </form>

    </div>
  </div>

</body>

</html>
