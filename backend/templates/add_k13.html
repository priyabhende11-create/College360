<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Co-Curricular | College360</title>

    <style>
        :root {
            --blue: #1f3c88;
            --green: #28a745;
            --bg: #f4f6f8;
            --border: #dcdcdc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
        }

        /* ===== HEADER ===== */
        header {
            background: var(--blue);
            color: #fff;
            padding: 14px 22px;
            display: flex;
            align-items: center;
        }

        header h2 {
            margin: 0 auto;
            font-size: 20px;
            font-weight: 600;
        }

        .back-btn {
            background: var(--green);
            color: #fff;
            padding: 6px 14px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
        }

        /* ===== CARD ===== */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            background: #fff;
            border-radius: 10px;
            padding: 28px 30px 35px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
            position: relative;
        }

        /* ===== VIEW BUTTON (RIGHT CORNER) ===== */
        .view-btn {
            position: absolute;
            top: 22px;
            right: 30px;
            background: var(--green);
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        /* ===== FORM TITLE ===== */
        .form-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 24px;
        }

        /* ===== SUCCESS ===== */
        .success {
            display: none;
            background: #e6f4ea;
            color: #155724;
            padding: 12px 16px;
            border-left: 5px solid var(--green);
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* ===== FORM GRID ===== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px 22px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .field input,
        .field select {
            height: 38px;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
        }

        /* ===== ACTIONS ===== */
        .actions {
            margin-top: 26px;
        }

        .actions button {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width:900px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width:600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script>
        function showSuccess() {
            const s = document.getElementById("success");
            s.style.display = "block";
            setTimeout(() => { s.style.display = "none"; }, 8000);
        }
    </script>
</head>

<body>

    <header>
        <a href="{{ url_for('act') }}" class="back-btn">← Back</a>
        <h2 style="flex:1;text-align:center;">Government Polytechnic Yavatmal</h2>
    </header>

    <div class="container">

        <a href="{{ url_for('view_k13') }}" class="view-btn">View Report</a>

        <div class="form-title">Co-Curricular Activity (K13)</div>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-grid">

                <div>
                    <label>Institute Name</label>
                    <input type="text">
                </div>

                <div>
                    <label>Academic Year</label>
                    <input type="text" name="academic_year" placeholder="2023-24" required>
                </div>

                <div>
                    <label>Programme</label>
                    <input value="{{ dept_name }}" readonly>
                </div>

                <div>
                    <label>Date</label>
                    <input type="date" name="activity_date" required>
                </div>

                <div>
                    <label>Type of Activity</label>
                    <select name="activity_type" required>
                        <option value="">Select</option>
                        <option value="Dance">Paper Presentation</option>
                        <option value="Quiz">Debate</option>
                        <option value="Sports">Poster Presentation</option>
                        <option value="Technical Event">Technical Event</option>
                        <option value="Seminar">Seminar</option>
                        <option value="Workshop">Workshop</option>
                    </select>
                </div>

                <div>
                    <div>
                        <label>Organizer</label>
                        <select name="organizer" id="organizer" onchange="checkOrganizer()">
                            <option value="Institute">Institute</option>
                            <option value="MSBTE">MSBTE</option>
                            <option value="DTE">DTE</option>
                            <option value="Other">Other</option>
                        </select>

                        <input type="text" name="organizer_other" id="organizer_other"
                            placeholder="Enter Organizer Name" style="display:none;margin-top:8px;">
                    </div>
                </div>

                <div>
                    <label>Student Name</label>
                    <input type="text" name="student_name" required>
                </div>

                <div>
                    <label>Enrollment No</label>
                    <input type="text" name="enrollment_no" required>
                </div>

                <div>
                    <label>Award / Prize</label>
                    <input type="text" name="award_prize">
                </div>

                <div>
                    <label>No of Participants</label>
                    <input type="number" name="participants">
                </div>

                <div>
                    <label>PO / PSO</label>
                    <input type="text" name="po_pso">
                </div>
                <div>
                    <label>Upload Photos</label>
                    <input type="file" name="photo" accept="image/*" multiple class="form-control">
                </div>
           

    </div>

    <div class="actions">
        <button type="submit">Save</button>
    </div>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div style="color:green; margin-bottom:10px;">
        {% for message in messages %}
        {{ message }}
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    </form>
    </div>
    <script>
        function checkOrganizer() {
            let org = document.getElementById("organizer").value;
            let box = document.getElementById("organizer_other");

            if (org === "Other") {
                box.style.display = "block";
            } else {
                box.style.display = "none";
                box.value = "";
            }
        }
    </script>

</body>

</html>
