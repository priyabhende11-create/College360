<!DOCTYPE html>
<html>
<head>
    <title>Upload Gazette</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white text-center">
            <h4>Bulk Gazette Upload</h4>
        </div>

        <div class="card-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/upload_gazette" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Academic Year</label>
                    <input type="text" name="academic_year" class="form-control" placeholder="2024-25" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Excel File</label>
                    <input type="file" name="file" class="form-control" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success">
                        Upload Gazette
                    </button>
                </div>

            </form>

            <hr>

            <div class="text-center">
                <a href="/download_format" class="btn btn-outline-primary">
                    Download Format
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
