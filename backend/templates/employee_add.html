<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add New Employee | College 360</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f6f8;
        }

        /* ================= HEADER ================= */
        .header {
            background: #003366;
            color: white;
            padding: 18px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        /* Back Arrow - GREEN BOX */
        .header-back {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            color: #da7070;
            padding: 7px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .header-back i {
            font-size: 16px;
        }

        .header-back:hover {
            background: #bfefc5;
        }

        /* ================= FORM ================= */
        .form-container {
            max-width: 650px;
            background: #ffffff;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 500;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .gender-group {
            display: flex;
            gap: 15px;
        }

        .btn-group {
            text-align: center;
            margin-top: 24px;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit {
            background: #003366;
            color: white;
        }

        .reset {
            background: #ccc;
        }
    </style>
</head>

<body>

    <!-- ================= HEADER ================= -->
    <div class="header">
        <a href="{% if session.role == 'principal' %}
                {{ url_for('principal_dashboard') }}
             {% else %}
                {{ url_for('hod_dashboard') }}
             {% endif %}" class="header-back">
            <i class="fas fa-arrow-left"></i> Back
        </a>

        <h1>Government Polytechnic Yavatmal</h1>
    </div>

    <!-- ================= FORM ================= -->
    <div class="form-container">

        <form action="{{ url_for('employee_add') }}" method="POST" enctype="multipart/form-data">

            {% if session.role == 'principal' %}
            <div class="form-group">
                <label>Department</label>
                <select name="dept_id" required>
                    <option value="">-- Select Department --</option>
                    {% for d in departments %}
                    <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div class="form-group">
                <label>Employee Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>

            <div class="form-group">
                <label>Contact</label>
                <input type="text" name="contact" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>
            </div>

            <div class="form-group">
                <label>Qualification</label>
                <select name="qualification" required>
                    <option value="">Select</option>
                    <option>Diploma</option>
                    <option>B.E / B.Tech</option>
                    <option>M.E / M.Tech</option>
                    <option>MBA</option>
                    <option>PhD</option>
                </select>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="3" required></textarea>
            </div>

            <!-- BASIC DETAILS -->
            <div class="row">
                <div class="col-md-6">


                    <div class="form-group">
                        <label>Semester</label>
                        <select name="semester" required>
                            <option value="">Select Semester</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" name="subject" placeholder="Enter Subject Name" required>
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" name="subject_code" class="form-control" placeholder="Ex: CO301" required>
                    </div>





                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="submit">Submit</button>
                <button type="reset" class="reset">Reset</button>
            </div>

        </form>
    </div>

</body>

</html>
