<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College 360 – TPO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}
body{
    background:#eef2f7;
}

/* HEADER */
.header{
    background:linear-gradient(90deg,#003366,#0055aa);
    color:white;
    padding:22px 30px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
}

.header h1{
    text-align:center;
    font-size:22px;
    font-weight:600;
}

.header button{
    justify-self:end;
    background:white;
    color:#003366;
    border:none;
    padding:8px 18px;
    border-radius:20px;
    cursor:pointer;
    font-weight:500;
}

/* CARD */
.card{
    max-width:1100px;
    background:white;
    margin:30px auto;
    padding:30px;
    border-radius:14px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.card-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:25px;
}

.card-title span{
    background:#003366;
    color:white;
    padding:8px 12px;
    border-radius:50%;
    font-weight:bold;
}

.card-title h2{
    color:#003366;
    font-size:20px;
}

/* FORM GRID */
.form-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:22px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-size:14px;
    color:#444;
    margin-bottom:6px;
}

.form-group input,
.form-group textarea{
    padding:12px;
    border:1px solid #dcdcdc;
    border-radius:8px;
    font-size:14px;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#003366;
}

/* FULL WIDTH */
.full-width{
    grid-column:1 / 4;
}

/* BUTTONS */
.actions{
    margin-top:30px;
    text-align:center;
}

.actions button{
    padding:12px 30px;
    border:none;
    border-radius:25px;
    font-size:15px;
    cursor:pointer;
    margin:5px;
}

.save{
    background:#003366;
    color:white;
}

.reset{
    background:#e0e0e0;
}

/* FOOTER */
footer{
    text-align:center;
    padding:15px;
    color:#666;
    font-size:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .form-grid{ grid-template-columns:repeat(2,1fr); }
    .full-width{ grid-column:1/3; }
}
@media(max-width:600px){
    .form-grid{ grid-template-columns:1fr; }
    .full-width{ grid-column:1; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div></div>
    <h1>GOVERNMENT POLYTECHNIC YAVATMAL</h1>
    <button onclick="viewTPO()">View TPO</button>
</div>

<!-- ENTRY CARD -->
<div class="card">

<div class="card-title">
    <span>🎓</span>
    <h2>TPO Entry</h2>
</div>

<form onsubmit="return saveTPO()">

<div class="form-grid">

    <div class="form-group">
        <label>TPO ID</label>
        <input type="text" id="tpoId" placeholder="TPO001">
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter full name">
    </div>

    <div class="form-group">
        <label>Department ID</label>
        <input type="text" id="dept">
    </div>

    <div class="form-group">
        <label>Contact Number</label>
        <input type="tel" id="contact">
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email">
    </div>

    <div class="form-group">
        <label>Designation</label>
        <input type="text" id="designation" placeholder="Training & Placement Officer">
    </div>

    <div class="form-group full-width">
        <label>Professional Remark</label>
        <textarea id="remark" rows="3" placeholder="Experience, responsibilities, achievements"></textarea>
    </div>

</div>

<div class="actions">
    <button class="save" type="submit">Save Entry</button>
    <button class="reset" type="reset">Reset</button>
</div>

</form>
</div>

<!-- FOOTER -->
<footer>
© 2025 Government Polytechnic Yavatmal | College 360
</footer>

<script>
function saveTPO(){
    let fields = ["tpoId","name","dept","contact","email","designation","remark"];
    for(let f of fields){
        if(document.getElementById(f).value===""){
            alert("Please fill all fields");
            return false;
        }
    }
    alert("TPO Entry Saved Successfully!");
    return false;
}

function viewTPO(){
    alert("Redirect to TPO List / View Page");
}
</script>

</body>
</html>
