<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Department | College 360</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f4f6f8;}

/* HEADER */
.header{
    background:#003366;
    color:white;
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    font-size:22px;
    font-weight:600;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:20px;
    background:#7e6ad7;
    color:white;
    padding:6px 14px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    max-width:600px;
    background:white;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#003366;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    font-weight:500;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.btn{
    width:100%;
    background:#003366;
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
    font-size:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <button class="back-btn" onclick="goBack()">Back</button>
    GOVERNMENT POLYTECHNIC YAVATMAL
</div>

<div class="container">
<h2>Add Department</h2>

<form method="POST" action="{{ url_for('add_dept') }}">

<div class="form-group">
    <label>Department Name</label>
    <input type="text" name="dept_name" required>
</div>

<div class="form-group">
    <label>Department Code</label>
    <input type="text" name="dept_code" required>
</div>

<button class="btn">Add Department</button>

</form>
</div>

<script>
function addDepartment(){
    if(deptName.value==="" || deptCode.value===""){
        alert("Please fill all fields");
        return false;
    }

    let list = JSON.parse(localStorage.getItem("deptList")) || [];

    list.push({
        name: deptName.value,
        code: deptCode.value
    });

    localStorage.setItem("deptList", JSON.stringify(list));

    alert("Department Added Successfully");
    window.location.href="department-view.html";
    return false;
}

function goBack(){
    window.location.href="{{ url_for('principal_dashboard') }}"; // home/dashboard page
}
</script>

</body>
</html>
